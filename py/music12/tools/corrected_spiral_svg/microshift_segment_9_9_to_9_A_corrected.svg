<text x="1255.00" y="240.00" font-family="DejaVu Sans, Arial, sans-serif" font-size="18" font-weight="bold" fill="#111" text-anchor="start">MICROSHIFT FORMULA</text>
<text x="1255.00" y="285.00" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="normal" fill="#111" text-anchor="start">μ = ¹⁴⁴√2</text>
<text x="1255.00" y="313.00" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="normal" fill="#111" text-anchor="start">φ₀ = 360°</text>
<text x="1255.00" y="341.00" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="normal" fill="#111" text-anchor="start">φₙ₊₁ = φₙ / μ</text>
<text x="1255.00" y="369.00" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="normal" fill="#111" text-anchor="start">Φₙ = 2(φₙ − φₙ₊₁)</text>
<text x="1255.00" y="397.00" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="normal" fill="#111" text-anchor="start"></text>
<text x="1255.00" y="425.00" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="normal" fill="#111" text-anchor="start">Microsectors are normalized</text>
<text x="1255.00" y="453.00" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="normal" fill="#111" text-anchor="start">inside the 9 → A semitone sector.</text>
<text x="1255.00" y="481.00" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="normal" fill="#111" text-anchor="start"></text>
<text x="1255.00" y="509.00" font-family="DejaVu Sans, Arial, sans-serif" font-size="15" font-weight="normal" fill="#111" text-anchor="start">This is not equal linear subdivision.</text>
